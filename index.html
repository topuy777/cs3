<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATA KERJA | WZGAACS9</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    background:
    radial-gradient(circle at top,#a21caf 0%,transparent 40%),
    radial-gradient(circle at bottom,#ec4899 0%,transparent 40%),
    #0f0014;
    overflow-x:hidden;
    color:#fff;
}

/* Background Glow */
body::before{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#ff00c8;
    filter:blur(180px);
    opacity:.15;
    top:-200px;
    left:-150px;
    pointer-events:none;
}

body::after{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#ff4dd2;
    filter:blur(180px);
    opacity:.15;
    bottom:-200px;
    right:-150px;
    pointer-events:none;
}

/* Container */
.grid-container{
    width:100%;
    max-width:750px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
    position:relative;
    z-index:1;
}

/* Title */
.header-title{
    grid-column:span 2;
    text-align:center;
    font-size:38px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:4px;
    margin-bottom:20px;
    color:#ffffff;

    text-shadow:
    0 0 10px #ff00c8,
    0 0 20px #ff00c8,
    0 0 40px #ff00c8,
    0 0 80px #ff00c8;

    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px #ff00c8,
        0 0 20px #ff00c8;
    }
    to{
        text-shadow:
        0 0 20px #ff00c8,
        0 0 40px #ff00c8,
        0 0 80px #ff00c8;
    }
}

/* Card */
.btn-card{
    position:relative;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:25px;
    padding:25px;
    cursor:pointer;
    overflow:hidden;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;

    transition:.35s ease;
}

.btn-card::before{
    content:'';
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;

    background:
    linear-gradient(
    45deg,
    transparent,
    rgba(255,0,200,.25),
    transparent
    );

    transform:rotate(25deg);
    transition:.8s;
}

.btn-card:hover::before{
    left:120%;
}

.btn-card:hover{
    transform:translateY(-8px) scale(1.03);
    border-color:#ff00c8;

    box-shadow:
    0 0 20px rgba(255,0,200,.4),
    0 0 50px rgba(255,0,200,.2);
}

.btn-card i{
    font-size:34px;
    color:#ff00c8;

    text-shadow:
    0 0 10px #ff00c8,
    0 0 25px #ff00c8;
}

.btn-card span{
    color:#ffffff;
    font-size:14px;
    font-weight:700;
    letter-spacing:1px;
    text-align:center;
}

.full-width{
    grid-column:span 2;
}

/* Submenu */
.submenu{
    grid-column:span 2;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    max-height:0;
    overflow:hidden;

    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;

    transition:.5s ease;
}

.submenu.show{
    max-height:200px;
    padding:20px;
    margin-top:-5px;
}

.submenu a{
    text-decoration:none;
    color:#ffffff;
    padding:10px 18px;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    transition:.3s;
    font-size:13px;
    font-weight:600;
}

.submenu a:hover{
    background:#ff00c8;
    color:#ffffff;

    box-shadow:
    0 0 15px #ff00c8,
    0 0 30px #ff00c8;
}

.footer{
    grid-column:span 2;
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#ffffff;
    letter-spacing:2px;
    opacity:.8;
}

/* Responsive */
@media(max-width:650px){

    .grid-container{
        grid-template-columns:1fr;
    }

    .full-width,
    .header-title,
    .submenu,
    .footer{
        grid-column:span 1;
    }

    .header-title{
        font-size:26px;
    }
}
</style>
</head>
<body>

<div class="grid-container">

    <div class="header-title">
        DATA KERJA CAKRA DARMA
    </div>

    <!-- Konten Anda tetap sama -->

</div>

<script>
function toggleMenu(id){
    document.getElementById(id).classList.toggle('show');
}
</script>

</body>
</html>
