<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    background:
    radial-gradient(circle at top,#1e3a8a 0%,transparent 40%),
    radial-gradient(circle at bottom,#0891b2 0%,transparent 40%),
    #020617;
    overflow-x:hidden;
    color:#fff;
}

/* Background Glow */
body::before{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#06b6d4;
    filter:blur(180px);
    opacity:.15;
    top:-200px;
    left:-150px;
    pointer-events:none;
}

body::after{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#3b82f6;
    filter:blur(180px);
    opacity:.15;
    bottom:-200px;
    right:-150px;
    pointer-events:none;
}

/* Container */
.grid-container{
    width:100%;
    max-width:750px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
    position:relative;
    z-index:1;
}

/* Title */
.header-title{
    grid-column:span 2;
    text-align:center;
    font-size:38px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:4px;
    margin-bottom:20px;
    color:#ffffff;

    text-shadow:
    0 0 10px #00eaff,
    0 0 20px #00eaff,
    0 0 40px #00eaff,
    0 0 80px #00eaff;

    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px #00eaff,
        0 0 20px #00eaff;
    }
    to{
        text-shadow:
        0 0 20px #00eaff,
        0 0 40px #00eaff,
        0 0 80px #00eaff;
    }
}

/* Card */
.btn-card{
    position:relative;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:25px;
    padding:25px;
    cursor:pointer;
    overflow:hidden;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;

    transition:.35s ease;
}

.btn-card::before{
    content:'';
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background:
    linear-gradient(
    45deg,
    transparent,
    rgba(0,234,255,.2),
    transparent
    );
    transform:rotate(25deg);
    transition:.8s;
}

.btn-card:hover::before{
    left:120%;
}

.btn-card:hover{
    transform:translateY(-8px) scale(1.03);
    border-color:#00eaff;

    box-shadow:
    0 0 20px rgba(0,234,255,.3),
    0 0 50px rgba(0,234,255,.15);
}

.btn-card i{
    font-size:34px;
    color:#00eaff;

    text-shadow:
    0 0 10px #00eaff,
    0 0 25px #00eaff;
}

.btn-card span{
    color:#ffffff;
    font-size:14px;
    font-weight:700;
    letter-spacing:1px;
    text-align:center;
}

.full-width{
    grid-column:span 2;
}

/* Submenu */
.submenu{
    grid-column:span 2;
    background:rgba(0,0,0,.4);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    max-height:0;
    overflow:hidden;

    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;

    transition:.5s ease;
}

.submenu.show{
    max-height:200px;
    padding:20px;
    margin-top:-5px;
}

.submenu a{
    text-decoration:none;
    color:#ffffff;
    padding:10px 18px;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    transition:.3s;
    font-size:13px;
    font-weight:600;
}

.submenu a:hover{
    background:#00eaff;
    color:#001018;
    font-weight:700;

    box-shadow:
    0 0 15px #00eaff;
}

/* Footer */
.footer{
    grid-column:span 2;
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#ffffff;
    letter-spacing:2px;
    opacity:.8;
}

/* Responsive */
@media(max-width:650px){

    .grid-container{
        grid-template-columns:1fr;
    }

    .full-width,
    .header-title,
    .submenu,
    .footer{
        grid-column:span 1;
    }

    .header-title{
        font-size:26px;
    }
}
</style>
</head>

</div>
