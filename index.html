<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENTERPRISE SYSTEM | CAKRA DARMA</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --pink:#ff00c8;
    --gold:#ffcc33;
    --bg:#07000f;
    --glass:rgba(255,255,255,.06);
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    background:linear-gradient(135deg,#050008,#0b0012,#12001d);
    color:#fff;
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(255,255,255,.08);
    padding:20px;
    transition:.3s;
}

.sidebar.collapsed{
    width:80px;
}

.logo{
    font-size:20px;
    font-weight:900;
    text-align:center;
    color:var(--pink);
    text-shadow:0 0 15px var(--pink);
    margin-bottom:20px;
}

.toggle-btn{
    text-align:center;
    cursor:pointer;
    margin-bottom:20px;
    padding:8px;
    border-radius:10px;
    background:rgba(255,255,255,.05);
}

.menu-item{
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    transition:.3s;
}

.menu-item:hover{
    background:rgba(255,0,200,.15);
    box-shadow:0 0 15px rgba(255,0,200,.25);
}

/* hide text when collapsed */
.sidebar.collapsed .text{
    display:none;
}

.submenu{
    max-height:0;
    overflow:hidden;
    padding-left:15px;
    transition:.4s ease;
}

.menu-item.active + .submenu{
    max-height:200px;
    margin-top:5px;
}

.submenu a{
    display:block;
    padding:8px;
    margin-top:5px;
    text-decoration:none;
    color:#fff;
    font-size:13px;
    background:rgba(255,255,255,.04);
    border-radius:8px;
}

.submenu a:hover{
    background:var(--pink);
    box-shadow:0 0 10px var(--pink);
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* TOPBAR */
.topbar{
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:rgba(255,255,255,.03);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.title{
    font-weight:800;
    font-size:18px;
    color:var(--pink);
    text-shadow:0 0 10px var(--pink);
}

/* CONTENT */
.content{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:var(--glass);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:25px;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(255,0,200,.25);
    border-color:var(--pink);
}

.card i{
    font-size:28px;
    color:var(--gold);
    margin-bottom:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="logo">ENTERPRISE</div>

    <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <div class="menu-item" onclick="toggleMenu(this)">
        <i class="fas fa-chart-pie"></i>
        <span class="text">LAPORAN</span>
    </div>
    <div class="submenu">
        <a href="#">Ganti Data</a>
        <a href="#">Lock ID</a>
        <a href="#">Dual ID</a>
    </div>

    <div class="menu-item" onclick="toggleMenu(this)">
        <i class="fas fa-database"></i>
        <span class="text">DATA</span>
    </div>
    <div class="submenu">
        <a href="#">CRM</a>
        <a href="#">Rekapan</a>
    </div>

    <div class="menu-item" onclick="toggleMenu(this)">
        <i class="fas fa-crown"></i>
        <span class="text">BONUS</span>
    </div>
    <div class="submenu">
        <a href="#">VIP Bonus</a>
        <a href="#">Mahjong</a>
    </div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <div class="title">DASHBOARD ENTERPRISE SYSTEM</div>
        <div><i class="fas fa-user-circle"></i></div>
    </div>

    <div class="content">

        <div class="grid">
            <div class="card">
                <i class="fas fa-chart-line"></i>
                <div>STATISTIK</div>
            </div>

            <div class="card">
                <i class="fas fa-building-columns"></i>
                <div>STRUK BNI</div>
            </div>

            <div class="card">
                <i class="fas fa-calculator"></i>
                <div>RUMUS WD</div>
            </div>
        </div>

    </div>

</div>

<script>
function toggleMenu(el){
    el.classList.toggle('active');
}

function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('collapsed');
}
</script>

</body>
</html>
