<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL PRO | CAKRA DARMA</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --pink:#ff00c8;
    --gold:#ffcc33;
    --bg:#0a0010;
    --glass:rgba(255,255,255,.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    background:linear-gradient(135deg,#050008,#0b0012,#12001d);
    color:#fff;
    min-height:100vh;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:280px;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(255,255,255,.08);
    padding:20px;
}

.logo{
    text-align:center;
    font-size:22px;
    font-weight:900;
    margin-bottom:30px;
    color:var(--pink);
    text-shadow:0 0 15px var(--pink);
}

.menu{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu-item{
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    background:rgba(255,255,255,.03);
    transition:.3s;
    display:flex;
    align-items:center;
    gap:10px;
}

.menu-item:hover{
    background:rgba(255,0,200,.15);
    box-shadow:0 0 15px rgba(255,0,200,.2);
}

.submenu{
    max-height:0;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    gap:6px;
    padding-left:15px;
    transition:.4s ease;
}

.menu-item.active + .submenu{
    max-height:200px;
    margin-top:5px;
}

.submenu a{
    text-decoration:none;
    color:#fff;
    font-size:13px;
    padding:8px;
    border-radius:8px;
    background:rgba(255,255,255,.04);
}

.submenu a:hover{
    background:var(--pink);
    box-shadow:0 0 10px var(--pink);
}

/* CONTENT */
.content{
    flex:1;
    padding:30px;
}

.header{
    font-size:32px;
    font-weight:900;
    margin-bottom:20px;
    color:#fff;
    text-shadow:0 0 15px var(--pink);
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:var(--glass);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:25px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(255,0,200,.25);
    border-color:var(--pink);
}

.card i{
    font-size:30px;
    color:var(--gold);
    margin-bottom:10px;
}

.card span{
    display:block;
    font-weight:700;
}

/* RESPONSIVE */
@media(max-width:900px){
    body{flex-direction:column;}
    .sidebar{width:100%;}
    .cards{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
    .cards{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">VIP ADMIN</div>

    <div class="menu">

        <div class="menu-item" onclick="toggleMenu(this)">
            <i class="fas fa-chart-pie"></i> LAPORAN
        </div>
        <div class="submenu">
            <a href="#">Ganti Data</a>
            <a href="#">Lock ID</a>
            <a href="#">Spasi</a>
            <a href="#">Dual ID</a>
        </div>

        <div class="menu-item" onclick="toggleMenu(this)">
            <i class="fas fa-crown"></i> BONUS
        </div>
        <div class="submenu">
            <a href="#">Mahjong</a>
            <a href="#">VIP Bonus</a>
        </div>

        <div class="menu-item" onclick="toggleMenu(this)">
            <i class="fas fa-database"></i> DATA
        </div>
        <div class="submenu">
            <a href="#">CRM</a>
            <a href="#">Rekapan</a>
        </div>

    </div>
</div>

<!-- CONTENT -->
<div class="content">
    <div class="header">DASHBOARD VIP PRO</div>

    <div class="cards">
        <div class="card">
            <i class="fas fa-chart-line"></i>
            <span>STATISTIK</span>
        </div>

        <div class="card">
            <i class="fas fa-building-columns"></i>
            <span>STRUK BNI</span>
        </div>

        <div class="card">
            <i class="fas fa-calculator"></i>
            <span>RUMUS WD</span>
        </div>
    </div>
</div>

<script>
function toggleMenu(el){
    el.classList.toggle('active');
}
</script>

</body>
</html>
