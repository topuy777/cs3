<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATA KERJA | CAKRA DARMA</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --pink:#ff00c8;
    --pink-soft:#ff4dd2;
    --purple:#a21caf;
    --bg:#0b0012;
    --glass:rgba(255,255,255,.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    overflow-x:hidden;
    background:
    radial-gradient(circle at top left,#a21caf 0%,transparent 35%),
    radial-gradient(circle at bottom right,#ff00c8 0%,transparent 35%),
    linear-gradient(135deg,#050008,#0b0012,#12001d);
    color:#fff;
}

/* Glow Background */
body::before{
    content:'';
    position:fixed;
    width:550px;
    height:550px;
    background:#ff00c8;
    filter:blur(220px);
    opacity:.18;
    top:-250px;
    left:-150px;
    pointer-events:none;
}

body::after{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#ff4dd2;
    filter:blur(220px);
    opacity:.12;
    bottom:-250px;
    right:-150px;
    pointer-events:none;
}

.grid-container{
    width:100%;
    max-width:820px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
    position:relative;
    z-index:1;
}

.header-title{
    grid-column:span 2;
    text-align:center;
    font-size:42px;
    font-weight:900;
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:12px;

    text-shadow:
    0 0 10px var(--pink),
    0 0 20px var(--pink),
    0 0 40px var(--pink),
    0 0 80px var(--pink);

    animation:glow 2.5s infinite alternate;
}

.subtitle{
    grid-column:span 2;
    text-align:center;
    margin-top:-10px;
    margin-bottom:18px;
    opacity:.8;
    letter-spacing:2px;
    font-size:13px;
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px var(--pink),
        0 0 25px var(--pink);
    }
    to{
        text-shadow:
        0 0 20px var(--pink),
        0 0 40px var(--pink),
        0 0 90px var(--pink);
    }
}

.btn-card{
    position:relative;
    overflow:hidden;

    background:var(--glass);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;

    padding:28px;
    cursor:pointer;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;

    transition:.35s ease;
}

.btn-card::before{
    content:'';
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;

    background:
    linear-gradient(
    45deg,
    transparent,
    rgba(255,0,200,.25),
    transparent
    );

    transform:rotate(25deg);
    transition:.8s;
}

.btn-card:hover::before{
    left:120%;
}

.btn-card:hover{
    transform:translateY(-8px) scale(1.03);

    border-color:rgba(255,0,200,.5);

    box-shadow:
    0 0 20px rgba(255,0,200,.4),
    0 0 60px rgba(255,0,200,.2);
}

.btn-card i{
    font-size:36px;
    color:var(--pink);

    text-shadow:
    0 0 10px var(--pink),
    0 0 30px var(--pink);
}

.btn-card span{
    font-size:14px;
    font-weight:700;
    letter-spacing:1px;
    text-align:center;
}

.full-width{
    grid-column:span 2;
}

.submenu{
    grid-column:span 2;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.06);
    border-radius:20px;

    max-height:0;
    overflow:hidden;

    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;

    transition:.5s ease;
}

.submenu.show{
    max-height:250px;
    padding:20px;
}

.submenu a{
    text-decoration:none;
    color:#fff;

    background:rgba(255,255,255,.05);
    padding:10px 18px;

    border-radius:12px;
    transition:.3s;
    font-size:13px;
    font-weight:600;
}

.submenu a:hover{
    background:var(--pink);

    box-shadow:
    0 0 15px var(--pink),
    0 0 30px var(--pink);
}

.footer{
    grid-column:span 2;
    text-align:center;
    margin-top:10px;
    font-size:12px;
    letter-spacing:3px;
    opacity:.75;
}

@media(max-width:700px){

    .grid-container{
        grid-template-columns:1fr;
    }

    .full-width,
    .header-title,
    .subtitle,
    .submenu,
    .footer{
        grid-column:span 1;
    }

    .header-title{
        font-size:28px;
    }
}
</style>
</head>
<body>

<div class="grid-container">

    <div class="header-title">
        DATA KERJA CAKRA DARMA
    </div>

    <div class="subtitle">
        PREMIUM PINK MAGENTA DASHBOARD
    </div>

    <div class="btn-card full-width" onclick="toggleMenu('lap')">
        <i class="fas fa-chart-pie"></i>
        <span>LAPORAN UTAMA</span>
    </div>

    <div id="lap" class="submenu">
        <a href="#"><i class="fas fa-user-edit"></i> Ganti Data</a>
        <a href="#"><i class="fas fa-user-lock"></i> Lock</a>
        <a href="#"><i class="fas fa-font"></i> Spasi</a>
        <a href="#"><i class="fas fa-shield-halved"></i> Dual ID</a>
    </div>

    <div class="btn-card" onclick="window.open('#','_blank')">
        <i class="fas fa-crown"></i>
        <span>BONUS MAHJONG</span>
    </div>

    <div class="btn-card" onclick="window.open('#','_blank')">
        <i class="fas fa-database"></i>
        <span>DATA CRM</span>
    </div>

    <div class="btn-card" onclick="window.open('#','_blank')">
        <i class="fas fa-chart-line"></i>
        <span>REKAPAN</span>
    </div>

    <div class="btn-card" onclick="window.open('#','_blank')">
        <i class="fas fa-building-columns"></i>
        <span>BUKTI STRUK BNI</span>
    </div>

    <div class="btn-card full-width" onclick="window.open('#','_blank')">
        <i class="fas fa-calculator"></i>
        <span>RUMUS WD</span>
    </div>

    <div class="footer">
        ABOY • WZGAACS9 DJARUM4D
    </div>

</div>

<script>
function toggleMenu(id){
    document.getElementById(id).classList.toggle('show');
}
</script>

</body>
</html>
